name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Write credentials file
        env:
          GCP_KEY: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          mkdir -p ~/.config/gcloud
          echo "$GCP_KEY" > ~/.config/gcloud/credentials.json
      
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Authenticate to Google Cloud
        run: |
          gcloud auth activate-service-account --key-file ~/.config/gcloud/credentials.json
          gcloud config set project brukerstats-dashboard
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy sendChatNotification function
        run: |
          gcloud functions deploy sendChatNotification \
            --runtime nodejs20 \
            --trigger-resource chat_channels \
            --trigger-event providers/cloud.firestore/eventTypes/document.onCreate \
            --source functions \
            --entry-point sendChatNotification \
            --region us-central1 \
            --project brukerstats-dashboard \
            --quiet
      
      - name: Deploy sendDMNotification function
        run: |
          gcloud functions deploy sendDMNotification \
            --runtime nodejs20 \
            --trigger-resource chat_dms \
            --trigger-event providers/cloud.firestore/eventTypes/document.onCreate \
            --source functions \
            --entry-point sendDMNotification \
            --region us-central1 \
            --project brukerstats-dashboard \
            --quiet
